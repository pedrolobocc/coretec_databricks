resources:
  jobs:
    coretec_pipeline:
      name: coretec_pipeline_dev
      tasks:
        - task_key: ingest_bronze
          disable_auto_optimization: true
          disabled: false
          email_notifications: {}
          max_retries: 1
          min_retry_interval_millis: 60000
          notebook_task:
            notebook_path: ../src/coretec_pipeline_dev/02_ingest_landing_to_bronze.ipynb
            source: WORKSPACE
          retry_on_timeout: false
          run_if: ALL_SUCCESS
          timeout_seconds: 600
          webhook_notifications: {}
        - task_key: transform_silver
          depends_on:
            - task_key: ingest_bronze
          disabled: false
          email_notifications: {}
          notebook_task:
            notebook_path: ../src/coretec_pipeline_dev/03_transform_bronze_to_silver.ipynb
            source: WORKSPACE
          run_if: ALL_SUCCESS
          timeout_seconds: 0
          webhook_notifications: {}
        - task_key: build_gold
          depends_on:
            - task_key: transform_silver
          disabled: false
          email_notifications: {}
          notebook_task:
            notebook_path: ../src/coretec_pipeline_dev/04_build_silver_to_gold.ipynb
            source: WORKSPACE
          run_if: ALL_SUCCESS
          timeout_seconds: 0
          webhook_notifications: {}
        - task_key: validade_pipeline
          depends_on:
            - task_key: build_gold
          disabled: false
          email_notifications: {}
          notebook_task:
            base_parameters:
              force_fail: "false"
            notebook_path: ../src/coretec_pipeline_dev/05_validate_pipeline.ipynb
            source: WORKSPACE
          run_if: ALL_SUCCESS
          timeout_seconds: 0
          webhook_notifications: {}
      email_notifications:
        no_alert_for_skipped_runs: false
        on_failure:
          - pedro888897@hotmail.com
      max_concurrent_runs: 1
      notification_settings:
        no_alert_for_canceled_runs: false
        no_alert_for_skipped_runs: false
      performance_target: PERFORMANCE_OPTIMIZED
      queue:
        enabled: true
      schedule:
        pause_status: PAUSED
        quartz_cron_expression: 6 0 7 * * ?
        timezone_id: Europe/Rome
      timeout_seconds: 0
      webhook_notifications: {}
